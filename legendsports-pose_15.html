function recruitStats(sessions){
  const real=(sessions||[]).filter(s=>s.grade&&s.grade!=="—");
  if(!real.length) return { count:0, best:null, sports:[], moves:0, recent:[] };
  let best=real[0]; real.forEach(s=>{ if(rankGrade(s.grade)>rankGrade(best.grade)) best=s; });
  const sports=[...new Set(real.map(s=>s.sport))];
  const moves=new Set(real.map(s=>s.move)).size;
  const recent=real.slice(0,5);
  return { count:real.length, best, sports, moves, recent };
}

const DRILLS = {
  base:["Single-leg balance holds: 3×30s each leg.","Slow-motion reps focusing only on a quiet, level base.","Tape a line on the floor and keep your center over it."],
  power:["Box jumps or pogo hops: 3×8 for ground force.","Pause at your deepest load for 2s, then explode up.","Wall-sits 3×30s to build the load position."],

};

const EDGES = [["left_shoulder","right_shoulder"],["left_shoulder","left_elbow"],["left_elbow","left_wrist"],["right_shoulder","right_elbow"],["right_elbow","right_wrist"],["left_shoulder","left_hip"],["right_shoulder","right_hip"],["left_hip","right_hip"],["left_hip","left_knee"],["left_knee","left_ankle"],["right_hip","right_knee"],["right_knee","right_ankle"],["nose","left_shoulder"],["nose","right_shoulder"]];

// ---------- geometry / stats ----------
function angleDeg(a,b,c){ if(!a||!b||!c)return null; const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y}; const d=ab.x*cb.x+ab.y*cb.y; const m=Math.hypot(ab.x,ab.y)*Math.hypot(cb.x,cb.y); if(!m)return null; let v=d/m; v=Math.max(-1,Math.min(1,v)); return Math.acos(v)*180/Math.PI; }
function dist(a,b){ if(!a||!b)return null; return Math.hypot(a.x-b.x,a.y-b.y); }
function mid(a,b){ if(!a||!b)return null; return {x:(a.x+b.x)/2,y:(a.y+b.y)/2}; }
function clean(arr){ return arr.filter(v=>v!=null && !isNaN(v)); }
function mean(arr){ const a=clean(arr); return a.length?a.reduce((s,v)=>s+v,0)/a.length:null; }
function median(arr){ const a=clean(arr).sort((x,y)=>x-y); if(!a.length)return null; const m=Math.floor(a.length/2); return a.length%2?a[m]:(a[m-1]+a[m])/2; }
function stdev(arr){ const a=clean(arr); if(a.length<2)return null; const mu=mean(a); return Math.sqrt(a.reduce((s,v)=>s+(v-mu)*(v-mu),0)/a.length); }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
// scoring helpers (return 0..100)
function scoreHigher(v,zero,full){ if(v==null)return null; return clamp(((v-zero)/(full-zero))*100,0,100); }
function scoreLower(v,best,worst){ if(v==null)return null; return clamp(((worst-v)/(worst-best))*100,0,100); }
function scoreRange(v,lo,hi,margin){ if(v==null)return null; if(v>=lo&&v<=hi)return 100; const d=v<lo?lo-v:v-hi; return clamp(100-(d/margin)*100,0,100); }
function avgScores(list){ const a=list.filter(v=>v!=null); return a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):null; }

// ---------- pose model ----------
let _detector=null;
async function getDetector(){
  if(_detector)return _detector;
  const md=poseDetection.SupportedModels.MoveNet;
  try{ _detector=await poseDetection.createDetector(md,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_THUNDER}); }
  catch(e){ _detector=await poseDetection.createDetector(md,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}); }
  return _detector;
}
function seekTo(v,t){ return new Promise(res=>{ const f=()=>{v.removeEventListener("seeked",f);res();}; v.addEventListener("seeked",f); v.currentTime=t; }); }
function paintReady(v){ return new Promise(res=>{ let done=false; const fin=()=>{ if(!done){done=true;res();} }; if(v.requestVideoFrameCallback){ try{ v.requestVideoFrameCallback(()=>fin()); }catch(e){} } requestAnimationFrame(()=>requestAnimationFrame(fin)); setTimeout(fin,140); }); }
function kpMap(keypoints,thr){ const m={}; keypoints.forEach(k=>{ if(k.score>=thr) m[k.name]={x:k.x,y:k.y,score:k.score}; }); return m; }

async function runPose(url,onProgress){
  const det=await getDetector();
  const v=document.createElement("video"); v.src=url; v.muted=true; v.playsInline=true; v.preload="auto";
  await new Promise((res,rej)=>{ v.addEventListener("loadeddata",res,{once:true}); v.addEventListener("error",()=>rej(new Error("Could not load the video file")),{once:true}); });
  let dur=v.duration;
  if(!isFinite(dur)||dur===0){ await new Promise(res=>{ const f=()=>{ if(isFinite(v.duration)&&v.duration>0){v.removeEventListener("durationchange",f);res();} }; v.addEventListener("durationchange",f); v.currentTime=1e6; setTimeout(res,1500); }); dur=isFinite(v.duration)&&v.duration>0?v.duration:0; }
  const W=Math.min(480,v.videoWidth||480), scale=W/(v.videoWidth||W), H=Math.round((v.videoHeight||360)*scale);
  const canvas=document.createElement("canvas"); canvas.width=W; canvas.height=H; const ctx=canvas.getContext("2d");
  const N=24, poses=[], shots=[], shotEvery=Math.max(1,Math.round(N/6));
  let blankCount=0;
  for(let i=0;i<N;i++){
    const t=dur?(dur*(i+0.5))/N:0;
    try{ await seekTo(v,Math.min(t,Math.max(0,dur-0.05))); }catch(e){}
    await paintReady(v);
    ctx.drawImage(v,0,0,W,H);
    // quick blank-frame check (sample a few pixels)
    try{ const s=ctx.getImageData(W>>1,H>>1,1,1).data; const s2=ctx.getImageData(W>>2,H>>2,1,1).data; if((s[0]+s[1]+s[2]+s2[0]+s2[1]+s2[2])<12) blankCount++; }catch(e){}
    let res=[]; try{ res=await det.estimatePoses(canvas,{maxPoses:1,flipHorizontal:false}); }catch(e){}
    if(res&&res[0]){
      const meanScore=mean(res[0].keypoints.map(k=>k.score));
      poses.push({ t, kp:kpMap(res[0].keypoints,0.3), conf:meanScore });
      if(i%shotEvery===0 && shots.length<6){
        drawSkeleton(ctx,res[0].keypoints,0.3);
        shots.push(canvas.toDataURL("image/jpeg",0.75).split(",")[1]);
      }
    } else if(i%shotEvery===0 && shots.length<6){
      shots.push(canvas.toDataURL("image/jpeg",0.75).split(",")[1]);
    }
    if(onProgress)onProgress(Math.round(((i+1)/N)*100));
  }
  return { poses, shots, W, H, blankCount, N, dur };
}
function drawSkeleton(ctx,keypoints,thr){
  const byName={}; keypoints.forEach(k=>byName[k.name]=k);
  ctx.lineWidth=3; ctx.strokeStyle="#FF6A3D";
  EDGES.forEach(([a,b])=>{ const ka=byName[a],kb=byName[b]; if(ka&&kb&&ka.score>=thr&&kb.score>=thr){ ctx.beginPath(); ctx.moveTo(ka.x,ka.y); ctx.lineTo(kb.x,kb.y); ctx.stroke(); } });
  ctx.fillStyle="#F2C14E"; keypoints.forEach(k=>{ if(k.score>=thr){ ctx.beginPath(); ctx.arc(k.x,k.y,4,0,Math.PI*2); ctx.fill(); } });
}

// ---------- hand-coded biomechanical analysis ----------
function pick(kp,name){ return kp[name]||null; }
function bestSideKnee(kp){ const l=angleDeg(pick(kp,"left_hip"),pick(kp,"left_knee"),pick(kp,"left_ankle")); const r=angleDeg(pick(kp,"right_hip"),pick(kp,"right_knee"),pick(kp,"right_ankle")); return mean([l,r]); }
function bestSideElbow(kp){ const l=angleDeg(pick(kp,"left_shoulder"),pick(kp,"left_elbow"),pick(kp,"left_wrist")); const r=angleDeg(pick(kp,"right_shoulder"),pick(kp,"right_elbow"),pick(kp,"right_wrist")); return {l,r,mean:mean([l,r]),max:(l==null&&r==null)?null:Math.max(l||0,r||0)}; }

const CATINFO={
  base:{label:"Balance & base", why:"A quiet, stable base is what every other part of the motion is built on."},
  power:{label:"Load & power", why:"Power starts by loading the legs and driving up through the ground."},
  mech:{label:"Range & mechanics", why:"Full range lets you transfer energy efficiently and repeat it under pressure."},
  finish:{label:"Follow-through", why:"A complete, balanced finish keeps the motion accurate and consistent."},
};
const PROGRESS={
  base:["Week 1 — 3×30s single-leg balance holds + 20 slow reps staying centered.","Week 2 — Run the move at half speed keeping your center quiet.","Week 3 — Full intensity with the base still rock-steady."],
  power:["Week 1 — 3×8 pause squats, holding your deepest load 2 seconds.","Week 2 — 3×8 box jumps, then load→drive reps for ground force.","Week 3 — Load and explode in one motion at full speed."],
  mech:["Week 1 — Slow full-range reps, exaggerating the complete path.","Week 2 — Add a light resistance band through the full range.","Week 3 — Full-speed reps keeping that same complete range."],
  finish:["Week 1 — Hold your finish for 2 seconds on every rep.","Week 2 — Keep that finish while speeding the motion up.","Week 3 — Same complete, symmetric finish every rep, full speed."],
};
const GOALS={ base:"Stay centered on 8 of 10 reps with no visible sway.", power:"Hit full load depth and drive on every rep.", mech:"Reach full range on every rep without rushing.", finish:"Hold a complete, balanced finish on every rep." };
function buildPlan(cats){
  const ranked=Object.entries(cats).filter(([k,v])=>v!=null).sort((a,b)=>a[1]-b[1]);
  const picks=ranked.slice(0,2).map(([k])=>k);
  if(!picks.length)picks.push("base");
  return picks.map(k=>({ key:k, title:CATINFO[k].label, score:cats[k], why:CATINFO[k].why, drills:DRILLS[k], goal:GOALS[k], weeks:PROGRESS[k] }));
}

// Idealized, representative form templates per legend (NOT real motion-capture).
// minKnee=deepest knee bend deg, torsoLean=deg from vertical, finishElbow=arm extension deg at finish, releaseFrac=where peak extension lands in the motion (0-1), baseWidth=stance width / shoulder width.
const LEGEND_PROFILES={
  "Michael Jordan":{form:"mid-range pull-up form",minKnee:126,torsoLean:7,finishElbow:170,releaseFrac:0.55,baseWidth:1.4},
  "LeBron James":{form:"downhill power form",minKnee:118,torsoLean:11,finishElbow:165,releaseFrac:0.60,baseWidth:1.6},
  "Stephen Curry":{form:"quick high-release form",minKnee:134,torsoLean:5,finishElbow:173,releaseFrac:0.44,baseWidth:1.2},
  "Cristiano Ronaldo":{form:"explosive power-strike form",minKnee:115,torsoLean:14,finishElbow:150,releaseFrac:0.50,baseWidth:1.8},
  "Lionel Messi":{form:"low close-control form",minKnee:128,torsoLean:9,finishElbow:150,releaseFrac:0.52,baseWidth:1.5},
  "Serena Williams":{form:"explosive serve form",minKnee:122,torsoLean:8,finishElbow:172,releaseFrac:0.50,baseWidth:1.5},
  "Roger Federer":{form:"fluid compact form",minKnee:132,torsoLean:6,finishElbow:170,releaseFrac:0.52,baseWidth:1.3},
  "Rafael Nadal":{form:"heavy-topspin form",minKnee:120,torsoLean:12,finishElbow:165,releaseFrac:0.55,baseWidth:1.7},
  "Muhammad Ali":{form:"mobile rangy form",minKnee:140,torsoLean:8,finishElbow:165,releaseFrac:0.45,baseWidth:1.4},
  "Floyd Mayweather":{form:"compact counter form",minKnee:138,torsoLean:7,finishElbow:168,releaseFrac:0.48,baseWidth:1.3},
  "Tiger Woods":{form:"coiled power form",minKnee:135,torsoLean:18,finishElbow:160,releaseFrac:0.55,baseWidth:1.6},
  "Usain Bolt":{form:"tall driving form",minKnee:105,torsoLean:16,finishElbow:120,releaseFrac:0.50,baseWidth:1.0},
  "Shohei Ohtani":{form:"rotational power form",minKnee:128,torsoLean:12,finishElbow:160,releaseFrac:0.55,baseWidth:1.7},
  "Babe Ruth":{form:"big uppercut form",minKnee:130,torsoLean:14,finishElbow:158,releaseFrac:0.58,baseWidth:1.8},
};
function legendProfile(name){ return LEGEND_PROFILES[name]||{form:"all-around form",minKnee:125,torsoLean:10,finishElbow:165,releaseFrac:0.5,baseWidth:1.4}; }
function profDist(m,p){ let d=0,n=0; if(m.minKnee!=null){d+=Math.abs(m.minKnee-p.minKnee)/30;n++;} if(m.torso!=null){d+=Math.abs(m.torso-p.torsoLean)/20;n++;} if(m.finish!=null){d+=Math.abs(m.finish-p.finishElbow)/30;n++;} if(m.baseW!=null){d+=Math.abs(m.baseW-p.baseWidth)/0.6;n++;} return n?d/n:999; }
function torsoLeanDeg(kp){ const sm=mid(pick(kp,"left_shoulder"),pick(kp,"right_shoulder")); const hm=mid(pick(kp,"left_hip"),pick(kp,"right_hip")); if(!sm||!hm)return null; const dx=hm.x-sm.x,dy=hm.y-sm.y; if(dy===0)return null; return Math.abs(Math.atan2(dx,dy))*180/Math.PI; }

function analyzeMotion(data, sport, move, legend, level){
  const P=profileFor(move);
  const poses=data.poses;

  // Hard stop: frames came through blank, or no body found at all
  if((data.blankCount||0) > (data.N||24)*0.6 || poses.length===0){
    return {
      observed: `⚠ The video frames came through ${poses.length===0?"without a detectable body":"mostly black"} (${data.blankCount||0}/${data.N||24} blank). Nothing was measured — this is NOT a real score.`,
      grade:"—",
      summary:"The tracker couldn't read your clip — the frames were blank or no body was visible, so there's nothing to grade. Re-record side-on with your whole body in frame, in good light, using your phone's normal camera (MP4/MOV).",
      phases:[
        {name:"Base & balance",score:0,note:"No usable frames to measure."},
        {name:"Load & power",score:0,note:"No usable frames to measure."},
        {name:"Range & mechanics",score:0,note:"No usable frames to measure."},
        {name:"Follow-through",score:0,note:"No usable frames to measure."},
      ],
      comparison:[{metric:"Balance",you:0,legend:94},{metric:"Power",you:0,legend:96},{metric:"Finish",you:0,legend:96}],
      drills:["Re-record side-on with your full body in the frame.","Use a standard MP4/MOV from your phone camera.","Make sure the lighting is good and the camera is steady."],
      lowTrack:true,
    };
  }
  const avgConf=mean(poses.map(p=>p.conf));
  const usable=poses.filter(p=>p.conf>=0.25);
  const tracked=poses.length, confPct=avgConf!=null?Math.round(avgConf*100):0;

  // person scale (shoulder mid -> ankle mid), for normalizing translations
  const scales=poses.map(p=>{ const sm=mid(pick(p.kp,"left_shoulder"),pick(p.kp,"right_shoulder")); const am=mid(pick(p.kp,"left_ankle"),pick(p.kp,"right_ankle")); return dist(sm,am); });
  const personScale=median(scales)|| (data.H*0.5);

  // series
  const kneeSeries=poses.map(p=>bestSideKnee(p.kp));
  const elbowSeries=poses.map(p=>bestSideElbow(p.kp).mean);
  const hipHeight=poses.map(p=>{ const hm=mid(pick(p.kp,"left_hip"),pick(p.kp,"right_hip")); return hm?(data.H-hm.y)/personScale:null; });
  const comX=poses.map(p=>{ const hm=mid(pick(p.kp,"left_hip"),pick(p.kp,"right_hip")); return hm?hm.x/personScale:null; });
  const baseW=poses.map(p=>{ const a=dist(pick(p.kp,"left_ankle"),pick(p.kp,"right_ankle")); const s=dist(pick(p.kp,"left_shoulder"),pick(p.kp,"right_shoulder")); return (a!=null&&s)?a/s:null; });

  // raw measures
  const minKnee=Math.min.apply(null,clean(kneeSeries).concat([999])); const hasKnee=clean(kneeSeries).length>0;
  const kneeROM=(()=>{ const a=clean(kneeSeries); return a.length?Math.max.apply(null,a)-Math.min.apply(null,a):null; })();
  const elbowROM=(()=>{ const a=clean(elbowSeries); return a.length?Math.max.apply(null,a)-Math.min.apply(null,a):null; })();
  const rise=(()=>{ const a=clean(hipHeight); return a.length?Math.max.apply(null,a)-Math.min.apply(null,a):null; })();
  const drift=stdev(comX);
  const baseWidth=median(baseW);
  // finish: last third of clip
  const tail=poses.slice(Math.floor(poses.length*0.66));
  const finishElbow=(()=>{ const a=clean(tail.map(p=>bestSideElbow(p.kp).max)); return a.length?Math.max.apply(null,a):null; })();
  // symmetry: mean |L-R| knee across clip, normalized
  const sym=mean(poses.map(p=>{ const l=angleDeg(pick(p.kp,"left_hip"),pick(p.kp,"left_knee"),pick(p.kp,"left_ankle")); const r=angleDeg(pick(p.kp,"right_hip"),pick(p.kp,"right_knee"),pick(p.kp,"right_ankle")); return (l!=null&&r!=null)?Math.abs(l-r):null; }));

  // ----- form-comparison measures -----
  const measTorso=median(poses.map(p=>torsoLeanDeg(p.kp)));
  let peakT=null,peakExt=-1;
  poses.forEach(p=>{ const eb=bestSideElbow(p.kp); const e=eb.max; if(e!=null&&e>peakExt){ peakExt=e; peakT=p.t; } });
  const dur=data.dur||(poses.length?poses[poses.length-1].t:0);

  // ----- category scores (0..100), hand-tuned -----
  const driftScore=scoreLower(drift,0.02,0.22);
  const baseScoreW=scoreRange(baseWidth,0.9,2.4,1.1);
  const base=avgScores([driftScore,baseScoreW]);

  const loadScore=hasKnee?scoreRange(minKnee,P.load[0],P.load[1],45):null;
  const explosiveScore=scoreHigher(rise,0.04,0.32);
  const power=avgScores([loadScore,explosiveScore]);

  const elbowROMScore=scoreHigher(elbowROM,25,80);
  const kneeROMScore=scoreHigher(kneeROM,15,55);
  const mech=avgScores([elbowROMScore,kneeROMScore]);

  const extScore=scoreHigher(finishElbow,120,178);
  const symScore=scoreLower(sym,4,45);
  const finish=avgScores([extScore,symScore]);

  // weighted overall
  const cats={base,power,mech,finish};
  let wsum=0,osum=0;
  ["base","power","mech","finish"].forEach(k=>{ if(cats[k]!=null){ osum+=cats[k]*P[k]; wsum+=P[k]; } });
  let overall=wsum?Math.round(osum/wsum):50;

  // confidence penalty if tracking was poor
  let lowTrack=false;
  if(avgConf==null||avgConf<0.3||usable.length<6){ lowTrack=true; overall=Math.round(overall*0.85); }

  // ----- legend reference targets (idealized, not real mocap) -----
  const seed=[...(legend||"")].reduce((s,c)=>s+c.charCodeAt(0),0);
  const lt=(b)=>clamp(b+((seed%5)-2),88,98);
  const legendCats={ base:lt(94), power:lt(96), mech:lt(95), finish:lt(96) };

  // ----- notes (templated from real numbers) -----
  const r=(x)=>x==null?"—":Math.round(x);
  const baseNote = base==null?"Couldn't read your base clearly." : base>=80?"Quiet, level base — minimal sway through the rep." : base>=60?`Mostly steady; some lateral drift to tighten.` : "Base drifts under load — widen the stance and steady your center.";
  const loadNote = !hasKnee?"Knee bend wasn't readable in these frames." : minKnee<=P.load[1]&&minKnee>=P.load[0]-10?`Strong load — knees bend to ~${r(minKnee)}° at the deepest point.` : minKnee>P.load[1]?`Shallow load (~${r(minKnee)}°) — bend deeper to drive from the ground.` : `Very deep bend (~${r(minKnee)}°) — make sure it's controlled, not a collapse.`;
  const mechNote = mech==null?"Range of motion wasn't readable." : mech>=80?`Full range — arm swings through ~${r(elbowROM)}° of motion.` : mech>=60?"Decent range; let the motion travel a touch further." : `Limited range (~${r(elbowROM)}° at the arm) — open up the full motion path.`;
  const finishNote = finish==null?"Follow-through wasn't readable." : finish>=80?`Long, balanced finish — arm extends to ~${r(finishElbow)}°.` : finish>=60?"Finish is okay; hold the extension a beat longer." : `Finish cuts short (arm to ~${r(finishElbow)}°) — extend fully and stay symmetric.`;

  const phases=[
    {name:"Base & balance", score:base==null?50:base, note:baseNote},
    {name:"Load & power", score:power==null?50:power, note:loadNote},
    {name:"Range & mechanics", score:mech==null?50:mech, note:mechNote},
    {name:"Follow-through", score:finish==null?50:finish, note:finishNote},
  ];
  const comparison=[
    {metric:"Balance", you:base==null?50:base, legend:legendCats.base},
    {metric:"Power", you:power==null?50:power, legend:legendCats.power},
    {metric:"Mechanics", you:mech==null?50:mech, legend:legendCats.mech},
    {metric:"Finish", you:finish==null?50:finish, legend:legendCats.finish},
  ];

  // weakest categories -> plan
  const ranked=Object.entries(cats).filter(([k,v])=>v!=null).sort((a,b)=>a[1]-b[1]);
  const weak=(ranked[0]&&ranked[0][0])||"base";
  const plan=buildPlan(cats);

  const grade=(o=>o>=90?"A":o>=86?"A-":o>=82?"B+":o>=77?"B":o>=72?"B-":o>=67?"C+":o>=62?"C":o>=56?"C-":o>=50?"D+":"D")(overall);

  const ranked2=Object.entries(cats).filter(([k,v])=>v!=null).sort((a,b)=>b[1]-a[1]);
  const bestCat=ranked2.length?ranked2[0][0]:"base";
  const catLabel={base:"balance",power:"power generation",mech:"range of motion",finish:"follow-through"};
  const noteFor={ base:baseNote, power:loadNote, mech:mechNote, finish:finishNote };

  const summary = lowTrack
    ? `Tracking was partial on this clip, so treat the scores as rough. Where it could read you, your ${catLabel[bestCat]} graded best and ${catLabel[weak]} needs the most work.`
    : `Your ${catLabel[bestCat]} is the standout here, while ${catLabel[weak]} is the biggest opportunity. Every score below comes straight from your tracked joint angles.`;

  const analysis = lowTrack
    ? ["The tracker only got a partial read, so these are rough indicators rather than firm grades — a cleaner side-on clip will sharpen them."]
    : [
        `Strongest: ${catLabel[bestCat]} at ${cats[bestCat]}/100. ${noteFor[bestCat]}`,
        `Focus here first: ${catLabel[weak]} at ${cats[weak]}/100. ${noteFor[weak]}`,
        `Measured from your motion: deepest knee bend ~${r(minKnee)}°, arm range of motion ~${r(elbowROM)}°, follow-through extension ~${r(finishElbow)}°, vertical rise ~${rise!=null?(rise*100).toFixed(0):"—"}% of body height.`,
      ];

  const observed = lowTrack
    ? `⚠ Tracked ${tracked} frames but average joint confidence was only ${confPct}% — try a closer, full-body, side-on clip in good light for a cleaner read.`
    : `Tracked ${tracked} frames at ${confPct}% avg joint confidence. Deepest knee bend ~${r(minKnee)}°, arm range ~${r(elbowROM)}°, vertical rise ~${rise!=null?(rise*100).toFixed(0):"—"}% of body height.`;

  // ----- specific form comparison vs the closest legend template -----
  let match=null;
  const measVec={ minKnee:hasKnee?minKnee:null, torso:measTorso, finish:finishElbow, baseW:baseWidth };
  const measuredCount=[measVec.minKnee,measVec.torso,measVec.finish,measVec.baseW].filter(v=>v!=null).length;
  if(!lowTrack && measuredCount>=2){
    const cands=(SPORTS[sport]&&SPORTS[sport].legends)||[legend];
    let closest=cands[0], best=Infinity;
    cands.forEach(n=>{ const d=profDist(measVec,legendProfile(n)); if(d<best){best=d;closest=n;} });
    const cp=legendProfile(closest); const r2=(x)=>Math.round(x); const lines=[];
    if(measVec.minKnee!=null){ const dd=measVec.minKnee-cp.minKnee; lines.push(`Knee load: you bend to ~${r2(measVec.minKnee)}°, about ${Math.abs(r2(dd))}° ${dd>0?"less":"more"} than ${closest}'s ~${cp.minKnee}°.`); }
    if(peakT!=null&&dur){ const ideal=cp.releaseFrac*dur; const dt=peakT-ideal; lines.push(`Release timing: your peak extension lands ~${Math.abs(dt).toFixed(2)}s ${dt>0?"later":"earlier"} than the ${cp.form} benchmark.`); }
    if(measVec.torso!=null){ const dd=measVec.torso-cp.torsoLean; lines.push(`Torso lean: ~${r2(measVec.torso)}° from vertical, ${Math.abs(r2(dd))}° ${dd>0?"more":"less"} than ${closest}'s ~${cp.torsoLean}°.`); }
    if(measVec.finish!=null){ const dd=measVec.finish-cp.finishElbow; lines.push(`Follow-through: arm extends to ~${r2(measVec.finish)}°, ${Math.abs(r2(dd))}° ${dd>0?"straighter":"shorter"} than the ~${cp.finishElbow}° benchmark.`); }
    if(measVec.baseW!=null){ const pct=Math.round((measVec.baseW/cp.baseWidth-1)*100); if(Math.abs(pct)>=4) lines.push(`Stance width: about ${Math.abs(pct)}% ${pct>0?"wider":"narrower"} than ${closest}'s base.`); }
    match={ legend:closest, form:cp.form, chosen:legend, lines:lines.slice(0,4) };
  }

  return { observed, grade, summary, analysis, phases, comparison, plan, match, lowTrack };
}

  function beginRecording(){
    if(!streamRef.current)return; if(!window.MediaRecorder){setRecError("Recording isn't supported here. Upload instead.");return;}
    chunksRef.current=[]; let mime=""; for(const m of["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm","video/mp4"]){if(MediaRecorder.isTypeSupported(m)){mime=m;break;}}
    let rec; try{ rec=new MediaRecorder(streamRef.current,mime?{mimeType:mime}:undefined); }catch(e){ setRecError("Recording isn't supported here. Upload instead."); return; }
    recorderRef.current=rec; rec.ondataavailable=ev=>{ if(ev.data&&ev.data.size)chunksRef.current.push(ev.data); };
    rec.onstop=()=>{ const blob=new Blob(chunksRef.current,{type:mime||"video/webm"}); if(videoUrl)URL.revokeObjectURL(videoUrl); setVideoUrl(URL.createObjectURL(blob)); setFileName(`recording-${Date.now()}.${mime.includes("mp4")?"mp4":"webm"}`); stopCamera(); setRecording(false); setStep("context"); };
    rec.start(); setRecSecs(0); setRecording(true);
  }
  function stopRecording(){ if(recorderRef.current&&recorderRef.current.state!=="inactive")recorderRef.current.stop(); }

  function pickSport(s){ setSport(s); setLegend(SPORTS[s].legends[0]); setMove(SPORTS[s].moves[0]); }
  function onFile(e){ const f=e.target.files&&e.target.files[0]; if(!f)return; stopCamera(); setRecording(false); if(videoUrl)URL.revokeObjectURL(videoUrl); setVideoUrl(URL.createObjectURL(f)); setFileName(f.name); setStep("context"); }

  async function enhanceWithAI(rep, key){
    const measured = {
      grade: rep.grade,
      phases: rep.phases.map(p=>({name:p.name,score:p.score})),
      comparison: rep.comparison,
      measured_notes: rep.observed,
    };
    const prompt = `You are an elite ${sport} coach. A pose tracker measured this athlete's "${move}" from video and produced these REAL numbers (0-100 scores from tracked joint angles). Do NOT change the numbers. Compare them to ${legend} as an aspirational benchmark; do not invent quotes.
Measured data: ${JSON.stringify(measured)}
Athlete level: ${level}.
Write sharper, motivating-but-honest coaching grounded ONLY in these numbers. Respond with ONLY minified JSON, no markdown:
{"summary":"<2 sentences under 45 words>","analysis":["<3 short paragraphs, each under 30 words, referencing the actual scores>"],"plan":[{"title":"<focus area>","why":"<1 sentence>","drills":["<drill>","<drill>","<drill>"],"goal":"<measurable weekly goal>","weeks":["Week 1 — ...","Week 2 — ...","Week 3 — ..."]}]}
Give exactly 2 plan focus areas (the two lowest-scoring categories).`;
    const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(key)}`;
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||"AI request failed");
    const text=((data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts)||[]).map(p=>p.text||"").join("").replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(text);
    return { ...rep, summary:parsed.summary||rep.summary, analysis:parsed.analysis||rep.analysis, plan:parsed.plan||rep.plan, aiCoached:true };
  }

  async function analyze(){
    setStep("analyzing"); setError(""); setFrames([]); setProgress(0); setPhase("Loading pose model (first run downloads it once)…");
    try{
      await getDetector();
      setPhase("Tracking your joints frame by frame…");
      const data=await runPose(videoUrl,(p)=>setProgress(p));
      setFrames(data.shots);
      setPhase("Crunching the angles…");
      let rep=analyzeMotion(data,sport,move,legend,level);
      if(apiKey.trim() && !rep.lowTrack){
        setPhase("AI coach is writing your plan…");
        try{ rep=await enhanceWithAI(rep,apiKey.trim()); }
        catch(e){ rep={...rep, aiError:"AI coach unavailable ("+(e.message||"error")+") — showing the built-in analysis."}; }
      }
      setReport(rep); saveSession(rep, data.shots); setStep("report");
    }catch(err){ setError("Analysis failed: "+(err.message||err)+". Try a shorter, clearer clip, and make sure you're online for the first run."); setStep("context"); }
  }

              </div>
            )}

            {report.match && (
              <div style={{background:C.panel,border:`1px solid ${C.legend}`,borderRadius:14,padding:"20px 24px",marginBottom:28}}>
                <h3 style={{fontFamily:DISPLAY,textTransform:"uppercase",letterSpacing:1,fontSize:20,margin:"0 0 6px"}}>How your form compares</h3>
                <p style={{margin:"0 0 14px",fontSize:16,lineHeight:1.5}}>Your {move.toLowerCase()} most resembles <span style={{color:C.legend,fontWeight:600}}>{report.match.legend}'s {report.match.form}</span>.{report.match.chosen && report.match.chosen!==report.match.legend ? ` (You picked ${report.match.chosen}, but by the measurements your motion lines up closest with ${report.match.legend}.)` : ""}</p>
                {report.match.lines.map((l,i)=>(<div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:9}}><span style={{color:C.you,fontWeight:700}}>›</span><span style={{fontSize:14.5,lineHeight:1.5}}>{l}</span></div>))}
                <div style={{color:C.muted,fontSize:11.5,marginTop:12,lineHeight:1.5}}>Differences are measured from your tracked joints against an idealized model of each legend's form — a representative template, not motion-capture of the real player.</div>
              </div>
            )}

            <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:14,padding:"22px 24px",marginBottom:28}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:18}}>
                <h3 style={{fontFamily:DISPLAY,textTransform:"uppercase",letterSpacing:1,fontSize:20,margin:0}}>Tale of the tape</h3>
                <div style={{fontSize:13}}><span style={{color:C.you,fontWeight:600}}>You</span><span style={{color:C.muted}}> vs </span><span style={{color:C.legend,fontWeight:600}}>{legend}</span></div>
              </div>
              {report.comparison.map((c,i)=>(<div key={c.metric} style={{marginBottom:i===report.comparison.length-1?0:18}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:6}}><span>{c.metric}</span><span style={{color:C.muted}}><span style={{color:C.you}}>{c.you}</span> / <span style={{color:C.legend}}>{c.legend}</span></span></div>
                <div style={{marginBottom:5}}><Bar value={c.you} color={C.you} delay={i*120}/></div>
                <Bar value={c.legend} color={C.legend} delay={i*120+60}/>
              </div>))}
              <div style={{color:C.muted,fontSize:11.5,marginTop:14,lineHeight:1.5}}>Your numbers are measured from your tracked joints. The legend column is an idealized elite target for this move, not motion-capture of the real player.</div>
            </div>

            <h3 style={{fontFamily:DISPLAY,textTransform:"uppercase",letterSpacing:1,fontSize:20,margin:"0 0 14px"}}>Phase by phase</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:14,marginBottom:32}}>
              {report.phases.map(p=>(<div key={p.name} style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:12,padding:18}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}><span style={{fontFamily:DISPLAY,textTransform:"uppercase",letterSpacing:0.5,fontSize:15}}>{p.name}</span><span style={{fontFamily:DISPLAY,fontWeight:700,fontSize:22,color:p.score>=80?C.good:p.score>=65?C.legend:C.you}}>{p.score}</span></div>
                <Bar value={p.score} color={p.score>=80?C.good:p.score>=65?C.legend:C.you}/>
                <p style={{color:C.muted,fontSize:13.5,lineHeight:1.5,margin:"12px 0 0"}}>{p.note}</p>
              </div>))}
            </div>

            <h3 style={{fontFamily:DISPLAY,textTransform:"uppercase",letterSpacing:1,fontSize:20,margin:"0 0 14px"}}>Your improvement plan</h3>
            {(report.plan && report.plan.length>0) ? (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14,marginBottom:30}}>
                {report.plan.map((f,i)=>(
                  <div key={i} style={{background:C.panel2,border:`1px solid ${C.line}`,borderRadius:14,padding:"20px 22px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8,gap:10}}>
                      <span style={{fontFamily:DISPLAY,textTransform:"uppercase",letterSpacing:0.5,fontSize:17}}>{f.title}</span>
                      <span style={{fontFamily:DISPLAY,color:C.you,fontSize:12,letterSpacing:1}}>{i===0?"PRIORITY 1":"PRIORITY 2"}{f.score!=null?` · ${f.score}`:""}</span>
                    </div>
                    <p style={{color:C.muted,fontSize:13.5,lineHeight:1.5,margin:"0 0 14px"}}>{f.why}</p>
                    {f.drills && f.drills.length>0 && (
                      <div style={{marginBottom:14}}>
                        {f.drills.map((d,j)=>(<div key={j} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}><span style={{color:C.you,fontWeight:700}}>·</span><span style={{fontSize:14,lineHeight:1.45}}>{d}</span></div>))}
                      </div>
                    )}
                    {f.weeks && f.weeks.length>0 && (
                      <div style={{borderTop:`1px solid ${C.line}`,paddingTop:12,marginBottom:12}}>
                        {f.weeks.map((w,j)=>(<div key={j} style={{fontSize:13,lineHeight:1.5,color:C.chalk,marginBottom:6}}>{w}</div>))}
                      </div>
                    )}
                    {f.goal && (<div style={{fontSize:13,lineHeight:1.5}}><span style={{color:C.legend,fontFamily:DISPLAY,letterSpacing:0.5,textTransform:"uppercase",fontSize:11}}>Goal: </span>{f.goal}</div>)}
                  </div>
                ))}
              </div>
            ) : (
              <div style={{background:C.panel2,border:`1px solid ${C.line}`,borderRadius:14,padding:"22px 24px",marginBottom:30}}>
                {(report.drills||[]).map((d,i)=>(<div key={i} style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:i===(report.drills||[]).length-1?0:14}}><span style={{fontFamily:DISPLAY,fontWeight:700,color:C.you,fontSize:18,minWidth:22}}>{String(i+1).padStart(2,"0")}</span><span style={{fontSize:15,lineHeight:1.5}}>{d}</span></div>))}
              </div>
            )}

            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <button className="fr-btn" onClick={reset} style={{...btnSolid,padding:"13px 24px",border:"none"}}>Scout another clip</button>
              <button className="fr-btn" onClick={()=>setStep("context")} style={{background:"transparent",color:C.chalk,border:`1px solid ${C.line}`,padding:"13px 24px",borderRadius:8,cursor:"pointer",fontFamily:DISPLAY,letterSpacing:1,textTransform:"uppercase"}}>Re-run / change legend</button>
            </div>
          </section>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
